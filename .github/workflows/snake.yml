name: Generate snake animation

on:
  schedule:
    - cron: "0 */12 * * *" # Executa a cada 12 horas
  workflow_dispatch:
  push:
    branches:
      - main # Ou 'main', dependendo da sua branch principal

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: agenteorelhas
          # Removi o 'dist/' do output para simplificar o deploy
          outputs: snake.svg?palette=github-dark

      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: . # Se gerou na raiz, o build_dir é '.'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
